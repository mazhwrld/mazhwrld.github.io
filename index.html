<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>◆ TERMINAL</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0a0a0f;color:#c8d0e0;font-family:'Courier New',monospace;font-size:12px;height:100vh;overflow:hidden}#app{display:flex;flex-direction:column;height:100vh}.hdr{display:flex;align-items:center;background:#0d0d14;border-bottom:1px solid #1a1a2e;padding:0 12px;height:36px;gap:16px;flex-shrink:0}.logo{color:#00d4ff;font-weight:700;font-size:13px;letter-spacing:2px}.ticker-bar{flex:1;display:flex;gap:20px;overflow:hidden}.ticker-item{display:flex;gap:6px;align-items:center;white-space:nowrap}.ticker-name{color:#6a7590;font-size:11px}.ticker-val{color:#c8d0e0;font-size:11px}.ticker-chg.pos{color:#00e676}.ticker-chg.neg{color:#ff5252}.hdr-right{display:flex;align-items:center;gap:6px;color:#6a7590;font-size:11px}.live-dot{width:7px;height:7px;background:#00e676;border-radius:50%;animation:blink 1.5s infinite}@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}.tabs{display:flex;background:#0d0d14;border-bottom:1px solid #1a1a2e;padding:0 12px;flex-shrink:0}.tab{background:0 0;border:none;color:#6a7590;padding:8px 16px;cursor:pointer;font-family:'Courier New',monospace;font-size:11px;letter-spacing:1px;border-bottom:2px solid transparent;transition:all .2s}.tab:hover{color:#c8d0e0}.tab.active{color:#00d4ff;border-bottom-color:#00d4ff}.main{display:flex;flex:1;overflow:hidden}.sidebar{width:200px;background:#0d0d14;border-right:1px solid #1a1a2e;padding:10px;overflow-y:auto;flex-shrink:0}.s-title{color:#6a7590;font-size:10px;letter-spacing:2px;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #1a1a2e}.content{flex:1;padding:12px;overflow-y:auto}.panel-title{color:#6a7590;font-size:10px;letter-spacing:2px;margin-bottom:10px;padding-bottom:4px;border-bottom:1px solid #1a1a2e}.tab-panel{display:none}.tab-panel.active{display:block}.macro-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}.mcard{background:#111118;border:1px solid #1a1a2e;border-radius:4px;padding:12px}.mlabel{color:#6a7590;font-size:10px;letter-spacing:1px;margin-bottom:6px}.mval{font-size:18px;font-weight:700}.mtrend{font-size:10px;margin-top:4px}.pos{color:#00e676}.neg{color:#ff5252}.neu{color:#ffab40}.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:10px}.card{background:#111118;border:1px solid #1a1a2e;border-radius:4px;padding:12px}.card-ticker{color:#00d4ff;font-size:11px;font-weight:700;margin-bottom:3px}.card-price{font-size:15px;font-weight:700}.card-chg{font-size:11px;margin-top:2px}.settings-btn{background:#1a1a2e;border:1px solid #00d4ff;color:#00d4ff;padding:5px 10px;border-radius:3px;cursor:pointer;font-size:10px;margin-top:10px;width:100%}.settings-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:1000;justify-content:center;align-items:center}.settings-modal.active{display:flex}.modal-content{background:#0d0d14;border:1px solid #1a1a2e;border-radius:4px;padding:20px;max-width:500px;width:90%}.modal-title{color:#00d4ff;font-size:14px;margin-bottom:15px}.input-group{margin-bottom:15px}.input-label{color:#6a7590;font-size:10px;margin-bottom:5px;display:block}.input-field{width:100%;background:#1a1a2e;border:1px solid #00d4ff;color:#c8d0e0;padding:8px;border-radius:3px;font-family:'Courier New',monospace;font-size:11px}.btn{background:#00d4ff;color:#0a0a0f;border:none;padding:8px 15px;border-radius:3px;cursor:pointer;font-size:11px;margin-right:10px}.btn-close{background:#ff5252}::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0a0a0f}::-webkit-scrollbar-thumb{background:#1a1a2e;border-radius:2px}</style></head><body><div id="app"><div class="hdr"><div class="logo">◆ TERMINAL</div><div class="ticker-bar" id="tickerBar"></div><div class="hdr-right"><div class="live-dot"></div><span id="clock">00:00:00</span><span>LIVE</span></div></div><div class="tabs"><button class="tab active" data-tab="macro">MACRO</button><button class="tab" data-tab="watchlist">WATCHLIST</button></div><div class="main"><div class="sidebar"><div class="s-title">STATUS</div><div style="font-size:10px;color:#6a7590;padding:5px 0">Live: <span style="color:#00e676">Active</span></div><div style="font-size:10px;color:#6a7590;padding:5px 0">Updated: <span id="lastUpdate">--:--</span></div><button class="settings-btn" onclick="openSettings()">⚙ API KEYS</button></div><div class="content"><div id="tab-macro" class="tab-panel active"><div class="panel-title">LIVE MACRO (TWELVE DATA + FRED)</div><div class="macro-grid" id="macroView"></div></div><div id="tab-watchlist" class="tab-panel"><div class="panel-title">MARKET WATCH</div><div class="cards-grid" id="marketCards"></div></div></div></div></div><div id="settingsModal" class="settings-modal"><div class="modal-content"><div class="modal-title">API KEYS</div><div class="input-group"><label class="input-label">Twelve Data API Key:</label><input type="text" id="twelveKey" class="input-field" placeholder="Введите ключ"></div><div class="input-group"><label class="input-label">FRED API Key:</label><input type="text" id="fredKey" class="input-field" placeholder="2e18d1b7275b9f3d2c9bd3cae285c415"></div><button class="btn" onclick="saveKeys()">СОХРАНИТЬ</button><button class="btn btn-close" onclick="closeSettings()">ЗАКРЫТЬ</button></div></div><script>const API={twelve:localStorage.getItem('twelveKey')||'',fred:localStorage.getItem('fredKey')||'2e18d1b7275b9f3d2c9bd3cae285c415'};const STATE={macro:[{l:'FED TARGET',v:'3.50-3.75%',tr:'UNCH',c:'neu'},{l:'US 10Y',v:'4.12%',tr:'-0.02%',c:'pos'},{l:'CPI YoY',v:'2.9%',tr:'-0.2%',c:'pos'},{l:'VIX',v:'...',tr:'',c:'neu'},{l:'DXY',v:'104.32',tr:'+0.3%',c:'neu'},{l:'GOLD',v:'...',tr:'',c:'neu'}],tickers:[{t:'SPY',p:0,ch:0},{t:'QQQ',p:0,ch:0},{t:'BTC/USD',p:0,ch:0},{t:'NVDA',p:0,ch:0},{t:'AAPL',p:0,ch:0},{t:'GLD',p:0,ch:0}]};async function fetchFRED(s){try{const r=await fetch(`https://api.stlouisfed.org/fred/series/observations?series_id=${s}&api_key=${API.fred}&file_type=json&limit=1&sort_order=desc`);const d=await r.json();return d.observations&&d.observations[0]?parseFloat(d.observations[0].value):null}catch(e){return null}}async function fetchTwelve(sym){if(!API.twelve){console.warn('No Twelve Data key');return null}try{const r=await fetch(`https://api.twelvedata.com/quote?symbol=${sym}&apikey=${API.twelve}`);const d=await r.json();if(d.code){console.error('Twelve Data error:',d.message);return null}return{p:parseFloat(d.close),ch:parseFloat(d.percent_change)}}catch(e){return null}}async function fetchCrypto(){try{const r=await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_change=true');const d=await r.json();const btc=STATE.tickers.find(t=>t.t==='BTC/USD');if(btc&&d.bitcoin){btc.p=d.bitcoin.usd;btc.ch=d.bitcoin.usd_24h_change||0}}catch(e){}}async function updateMacro(){const fed=await fetchFRED('FEDFUNDS');const tr=await fetchFRED('DGS10');const cpi=await fetchFRED('CPIAUCSL');STATE.macro[0].v=fed?`${fed.toFixed(2)}%`:'3.50-3.75%';STATE.macro[1].v=tr?`${tr.toFixed(2)}%`:'4.12%';STATE.macro[2].v=cpi?`${((cpi/100)*12).toFixed(1)}%`:'2.9%';renderMacro()}async function updateStocks(){const syms=['SPY','QQQ','NVDA','AAPL','GLD'];for(const s of syms){const d=await fetchTwelve(s);if(d){const t=STATE.tickers.find(x=>x.t===s);if(t){t.p=d.p;t.ch=d.ch}}await new Promise(r=>setTimeout(r,1000))}}async function updateAll(){await Promise.all([fetchCrypto(),updateMacro(),updateStocks()]);renderAll();document.getElementById('lastUpdate').textContent=new Date().toTimeString().slice(0,5)}function renderAll(){const b=STATE.tickers.slice(0,6).map(t=>`<div class="ticker-item"><span class="ticker-name">${t.t}</span><span class="ticker-val">${t.p.toFixed(2)}</span><span class="ticker-chg ${t.ch>=0?'pos':'neg'}">${t.ch>=0?'+':''}${t.ch.toFixed(2)}%</span></div>`).join('');document.getElementById('tickerBar').innerHTML=b;const c=STATE.tickers.map(t=>`<div class="card"><div class="card-ticker">${t.t}</div><div class="card-price ${t.ch>=0?'pos':'neg'}">${t.p.toFixed(2)}</div><div class="card-chg ${t.ch>=0?'pos':'neg'}">${t.ch>=0?'+':''}${t.ch.toFixed(2)}%</div></div>`).join('');document.getElementById('marketCards').innerHTML=c}function renderMacro(){const h=STATE.macro.map(m=>`<div class="mcard"><div class="mlabel">${m.l}</div><div class="mval">${m.v}</div><div class="mtrend ${m.c}">${m.tr}</div></div>`).join('');document.getElementById('macroView').innerHTML=h}function updateClock(){document.getElementById('clock').textContent=new Date().toTimeString().slice(0,8)}function openSettings(){document.getElementById('twelveKey').value=API.twelve;document.getElementById('fredKey').value=API.fred;document.getElementById('settingsModal').classList.add('active')}function closeSettings(){document.getElementById('settingsModal').classList.remove('active')}function saveKeys(){API.twelve=document.getElementById('twelveKey').value;API.fred=document.getElementById('fredKey').value;localStorage.setItem('twelveKey',API.twelve);localStorage.setItem('fredKey',API.fred);alert('Ключи сохранены!');closeSettings();updateAll()}document.querySelectorAll('.tab').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tab-panel').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('tab-'+b.dataset.tab).classList.add('active')})});setInterval(updateClock,1000);setInterval(updateAll,120000);renderAll();renderMacro();updateClock();updateAll()</script></body></html>
